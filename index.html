<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#0a0e27">
    <meta name="description" content="Registo de tarefas industriais - PWA offline para chão de fábrica">
    <title>Industrial Logger</title>
    
    <link rel="manifest" href="data:application/manifest+json,{
        %22name%22:%22Industrial Logger%22,
        %22short_name%22:%22IndLogger%22,
        %22description%22:%22Registo de tarefas industriais com um toque%22,
        %22start_url%22:%22./%22,
        %22display%22:%22standalone%22,
        %22background_color%22:%22%230a0e27%22,
        %22theme_color%22:%22%230a0e27%22,
        %22scope%22:%22./%22,
        %22orientation%22:%22portrait-primary%22,
        %22icons%22:[{%22src%22:%22data:image/svg+xml,<svg xmlns=%27http://www.w3.org/2000/svg%27 viewBox=%270 0 192 192%27><rect fill=%27%231f2937%27 width=%27192%27 height=%27192%27/><circle cx=%2796%27 cy=%2796%27 r=%2760%27 fill=%27%2310b981%27/><text x=%2796%27 y=%27110%27 font-size=%2760%27 font-weight=%27bold%27 fill=%27white%27 text-anchor=%27middle%27>IL</text></svg>%22,%22sizes%22:%22192x192%22,%22type%22:%22image/svg+xml%22,%22purpose%22:%22any%22}]
    }">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            -webkit-touch-callout: none;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 100%);
            color: #e0e0e0;
            display: flex;
            flex-direction: column;
            padding: 0;
            margin: 0;
            user-select: none;
            -webkit-user-select: none;
        }

        .container {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Header */
        .header {
            background: rgba(15, 23, 42, 0.95);
            padding: 12px 16px;
            border-bottom: 2px solid #2d3748;
            flex-shrink: 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header-left {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .header h1 {
            font-size: 20px;
            font-weight: 700;
            color: #10b981;
            margin: 0;
        }

        .header-date {
            font-size: 12px;
            color: #a0aec0;
        }

        .header-time {
            font-size: 14px;
            font-weight: 600;
            color: #cbd5e0;
            text-align: right;
        }

        /* Quick Action Buttons */
        .buttons-section {
            display: grid;
            grid-template-columns: repeat(1, 1fr);
            gap: 10px;
            padding: 16px;
            flex-shrink: 0;
            background: rgba(15, 23, 42, 0.5);
        }

        .action-btn {
            padding: 20px;
            border: none;
            border-radius: 12px;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.15s;
            color: white;
            text-shadow: 0 1px 3px rgba(0, 0, 0, 0.4);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
            position: relative;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
            touch-action: manipulation;
            font-family: inherit;
        }

        .action-btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
            pointer-events: none;
        }

        .action-btn:active::before {
            width: 300px;
            height: 300px;
        }

        .action-btn:active {
            transform: scale(0.97);
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.3);
        }

        .btn-inicio {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
        }

        .btn-fim {
            background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
        }

        .btn-alimentar {
            background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%);
        }

        .btn-arrumar {
            background: linear-gradient(135deg, #f97316 0%, #ea580c 100%);
        }

        .btn-descarga {
            background: linear-gradient(135deg, #a855f7 0%, #7e22ce 100%);
        }

        /* Timeline Section */
        .timeline-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background: rgba(15, 23, 42, 0.3);
            border-top: 1px solid #2d3748;
        }

        .timeline-header {
            padding: 12px 16px;
            font-size: 12px;
            font-weight: 700;
            color: #a0aec0;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 1px solid #2d3748;
            flex-shrink: 0;
        }

        .timeline {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .timeline::-webkit-scrollbar {
            width: 6px;
        }

        .timeline::-webkit-scrollbar-track {
            background: transparent;
        }

        .timeline::-webkit-scrollbar-thumb {
            background: #4a5568;
            border-radius: 3px;
        }

        .timeline-item {
            background: rgba(45, 55, 72, 0.6);
            border-left: 4px solid #10b981;
            padding: 12px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            animation: slideIn 0.3s ease-out;
            backdrop-filter: blur(10px);
        }

        .timeline-item.fim {
            border-left-color: #ef4444;
        }

        .timeline-item.alimentar {
            border-left-color: #3b82f6;
        }

        .timeline-item.arrumar {
            border-left-color: #f97316;
        }

        .timeline-item.descarga {
            border-left-color: #a855f7;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .timeline-item-time {
            font-weight: 700;
            font-size: 14px;
            color: #cbd5e0;
            min-width: 55px;
        }

        .timeline-item-content {
            flex: 1;
            margin: 0 12px;
            display: flex;
            flex-direction: column;
            gap: 3px;
        }

        .timeline-item-task {
            font-weight: 600;
            color: #e0e0e0;
            font-size: 14px;
        }

        .timeline-item-duration {
            font-size: 12px;
            color: #718096;
        }

        .timeline-item-delete {
            background: transparent;
            border: 1px solid #4a5568;
            color: #f56565;
            padding: 4px 8px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.2s;
            user-select: none;
            -webkit-user-select: none;
        }

        .timeline-item-delete:active {
            background: #4a5568;
            border-color: #f56565;
        }

        .empty-state {
            text-align: center;
            color: #4a5568;
            padding: 40px 20px;
            font-size: 14px;
        }

        /* Controls Section */
        .controls-section {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
            padding: 12px;
            background: rgba(15, 23, 42, 0.95);
            border-top: 1px solid #2d3748;
            flex-shrink: 0;
        }

        .control-btn {
            padding: 10px;
            border: 1px solid #4a5568;
            background: rgba(45, 55, 72, 0.6);
            color: #cbd5e0;
            border-radius: 8px;
            font-weight: 600;
            font-size: 11px;
            cursor: pointer;
            transition: all 0.2s;
            user-select: none;
            -webkit-user-select: none;
            text-align: center;
        }

        .control-btn:active {
            background: rgba(45, 55, 72, 0.9);
            border-color: #718096;
            transform: scale(0.98);
        }

        .control-btn.export-text {
            border-color: #3b82f6;
            color: #93c5fd;
        }

        .control-btn.backup-json {
            border-color: #f97316;
            color: #fed7aa;
        }

        .control-btn.import {
            border-color: #a855f7;
            color: #d8b4fe;
        }

        .control-btn.date-nav {
            border-color: #10b981;
            color: #a7f3d0;
        }

        .date-selector {
            grid-column: 1 / -1;
            display: flex;
            gap: 8px;
            align-items: center;
            justify-content: center;
            padding-top: 8px;
            border-top: 1px solid #2d3748;
        }

        .date-selector input {
            background: rgba(45, 55, 72, 0.6);
            border: 1px solid #4a5568;
            color: #cbd5e0;
            padding: 6px 8px;
            border-radius: 6px;
            font-size: 12px;
            cursor: pointer;
            flex: 1;
        }

        .date-selector button {
            background: rgba(45, 55, 72, 0.6);
            border: 1px solid #4a5568;
            color: #cbd5e0;
            padding: 6px 8px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 11px;
            font-weight: 600;
            transition: all 0.2s;
            user-select: none;
            -webkit-user-select: none;
        }

        .date-selector button:active {
            background: rgba(45, 55, 72, 0.9);
            border-color: #718096;
        }

        #fileInput {
            display: none;
        }

        .toast {
            position: fixed;
            bottom: 20px;
            right: 16px;
            background: rgba(45, 55, 72, 0.95);
            color: #e0e0e0;
            padding: 12px 16px;
            border-radius: 8px;
            border-left: 4px solid #10b981;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
            animation: slideUp 0.3s ease-out;
            z-index: 1000;
            font-size: 13px;
            font-weight: 500;
            max-width: 300px;
            word-wrap: break-word;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .toast.success {
            border-left-color: #10b981;
        }

        .toast.error {
            border-left-color: #ef4444;
        }

        .toast.info {
            border-left-color: #3b82f6;
        }

        /* Responsive */
        @media (max-width: 480px) {
            .buttons-section {
                padding: 12px;
                gap: 8px;
            }

            .action-btn {
                padding: 18px;
                font-size: 15px;
            }

            .controls-section {
                grid-template-columns: 1fr;
                padding: 10px;
                gap: 6px;
            }

            .control-btn {
                padding: 9px;
                font-size: 10px;
            }

            .date-selector {
                padding-top: 6px;
                gap: 6px;
            }
        }

        @media (orientation: landscape) {
            .buttons-section {
                display: grid;
                grid-template-columns: repeat(5, 1fr);
                gap: 8px;
                padding: 10px;
            }

            .action-btn {
                padding: 12px 8px;
                font-size: 13px;
            }

            .timeline-section {
                max-height: 300px;
            }
        }

        /* Prevent zoom on double tap */
        input, button {
            font-size: 16px;
        }

        .stats-bar {
            display: flex;
            justify-content: space-around;
            padding: 8px 12px;
            background: rgba(45, 55, 72, 0.4);
            border-bottom: 1px solid #2d3748;
            font-size: 11px;
            color: #a0aec0;
            flex-shrink: 0;
        }

        .stat-item {
            text-align: center;
        }

        .stat-label {
            font-weight: 600;
            color: #718096;
        }

        .stat-value {
            color: #cbd5e0;
            font-weight: 700;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <div class="header-left">
                <h1>⚙️ Industrial Logger</h1>
                <div class="header-date" id="headerDate"></div>
            </div>
            <div class="header-time" id="headerTime"></div>
        </div>

        <!-- Action Buttons -->
        <div class="buttons-section">
            <button class="action-btn btn-inicio" data-task="Início" data-type="inicio">🚀 INÍCIO</button>
            <button class="action-btn btn-alimentar" data-task="Alimentar Máquina" data-type="alimentar">🔧 ALIMENTAR MÁQUINA</button>
            <button class="action-btn btn-arrumar" data-task="Arrumar Paletes" data-type="arrumar">📦 ARRUMAR PALETES</button>
            <button class="action-btn btn-descarga" data-task="Descarga Camião" data-type="descarga">🚚 DESCARGA CAMIÃO</button>
            <button class="action-btn btn-fim" data-task="Fim" data-type="fim">🛑 FIM</button>
        </div>

        <!-- Stats Bar -->
        <div class="stats-bar">
            <div class="stat-item">
                <div class="stat-label">Registos</div>
                <div class="stat-value" id="statCount">0</div>
            </div>
            <div class="stat-item">
                <div class="stat-label">Início</div>
                <div class="stat-value" id="statStart">--:--</div>
            </div>
            <div class="stat-item">
                <div class="stat-label">Fim</div>
                <div class="stat-value" id="statEnd">--:--</div>
            </div>
        </div>

        <!-- Timeline -->
        <div class="timeline-section">
            <div class="timeline-header">Registos de Hoje</div>
            <div class="timeline" id="timeline">
                <div class="empty-state">Nenhum registo ainda. Clique num botão para começar!</div>
            </div>
        </div>

        <!-- Controls -->
        <div class="controls-section">
            <button class="control-btn export-text" id="exportTextBtn">📋 Exportar Texto</button>
            <button class="control-btn backup-json" id="backupJsonBtn">💾 Backup JSON</button>
            <button class="control-btn import" id="importBackupBtn">📥 Importar</button>
            <button class="control-btn date-nav" id="clearDayBtn">🗑️ Limpar Dia</button>
            <div class="date-selector">
                <input type="date" id="dateInput">
                <button id="todayBtn">Hoje</button>
            </div>
        </div>
    </div>

    <input type="file" id="fileInput" accept=".json">

    <script>
        // Service Worker Registration
        if ('serviceWorker' in navigator) {
            const swCode = `
                const CACHE_NAME = 'industrial-logger-v1';
                const urlsToCache = ['/'];

                self.addEventListener('install', event => {
                    event.waitUntil(
                        caches.open(CACHE_NAME).then(cache => {
                            return cache.addAll(urlsToCache).catch(() => {});
                        })
                    );
                    self.skipWaiting();
                });

                self.addEventListener('activate', event => {
                    event.waitUntil(
                        caches.keys().then(cacheNames => {
                            return Promise.all(
                                cacheNames.map(cacheName => {
                                    if (cacheName !== CACHE_NAME) {
                                        return caches.delete(cacheName);
                                    }
                                })
                            );
                        })
                    );
                    self.clients.claim();
                });

                self.addEventListener('fetch', event => {
                    event.respondWith(
                        caches.match(event.request).then(response => {
                            return response || fetch(event.request).catch(() => {
                                return new Response('Offline');
                            });
                        })
                    );
                });
            `;

            const blob = new Blob([swCode], { type: 'application/javascript' });
            const swUrl = URL.createObjectURL(blob);
            navigator.serviceWorker.register(swUrl).catch(() => {});
        }

        // App State
        const app = {
            tasks: {},
            currentDate: new Date().toISOString().split('T')[0],

            init() {
                this.loadData();
                this.setupEventListeners();
                this.updateTime();
                this.render();
                this.setDateInput();
                setInterval(() => this.updateTime(), 1000);
            },

            loadData() {
                const stored = localStorage.getItem('industrialLoggerData');
                if (stored) {
                    this.tasks = JSON.parse(stored);
                } else {
                    this.tasks = {};
                }
            },

            saveData() {
                localStorage.setItem('industrialLoggerData', JSON.stringify(this.tasks));
            },

            updateTime() {
                const now = new Date();
                const timeStr = now.toLocaleTimeString('pt-PT', { hour: '2-digit', minute: '2-digit' });
                const dateStr = now.toLocaleDateString('pt-PT', { weekday: 'short', month: 'short', day: 'numeric' });
                document.getElementById('headerTime').textContent = timeStr;
                document.getElementById('headerDate').textContent = dateStr;
            },

            setupEventListeners() {
                // Action buttons
                document.querySelectorAll('.action-btn').forEach(btn => {
                    btn.addEventListener('click', () => {
                        this.addTask(btn.dataset.task, btn.dataset.type);
                    });
                });

                // Date selector
                document.getElementById('dateInput').addEventListener('change', (e) => {
                    this.currentDate = e.target.value;
                    this.render();
                });

                document.getElementById('todayBtn').addEventListener('click', () => {
                    this.currentDate = new Date().toISOString().split('T')[0];
                    this.setDateInput();
                    this.render();
                });

                // Export/Backup
                document.getElementById('exportTextBtn').addEventListener('click', () => this.exportText());
                document.getElementById('backupJsonBtn').addEventListener('click', () => this.backupJson());
                document.getElementById('importBackupBtn').addEventListener('click', () => {
                    document.getElementById('fileInput').click();
                });
                document.getElementById('clearDayBtn').addEventListener('click', () => this.clearDay());

                document.getElementById('fileInput').addEventListener('change', (e) => this.importBackup(e));
            },

            setDateInput() {
                document.getElementById('dateInput').value = this.currentDate;
            },

            addTask(taskName, taskType) {
                if (!this.tasks[this.currentDate]) {
                    this.tasks[this.currentDate] = [];
                }

                const now = new Date();
                const time = now.toLocaleTimeString('pt-PT', { hour: '2-digit', minute: '2-digit' });

                this.tasks[this.currentDate].push({
                    time,
                    task: taskName,
                    type: taskType,
                    timestamp: now.getTime()
                });

                this.saveData();
                this.render();
                this.showToast(`✓ ${taskName}`, 'success');
            },

            deleteTask(index) {
                if (this.tasks[this.currentDate]) {
                    this.tasks[this.currentDate].splice(index, 1);
                    if (this.tasks[this.currentDate].length === 0) {
                        delete this.tasks[this.currentDate];
                    }
                    this.saveData();
                    this.render();
                }
            },

            render() {
                const timeline = document.getElementById('timeline');
                const dayTasks = this.tasks[this.currentDate] || [];

                if (dayTasks.length === 0) {
                    timeline.innerHTML = '<div class="empty-state">Nenhum registo para este dia.</div>';
                    this.updateStats(dayTasks);
                    return;
                }

                timeline.innerHTML = dayTasks.map((task, index) => {
                    const nextTask = dayTasks[index + 1];
                    let duration = '';

                    if (nextTask) {
                        const current = new Date(`2000-01-01 ${task.time}`);
                        const next = new Date(`2000-01-01 ${nextTask.time}`);
                        const diff = Math.round((next - current) / 60000);
                        if (diff > 0) {
                            duration = `+${diff}min`;
                        }
                    }

                    return `
                        <div class="timeline-item ${task.type}">
                            <div class="timeline-item-time">${task.time}</div>
                            <div class="timeline-item-content">
                                <div class="timeline-item-task">${task.task}</div>
                                ${duration ? `<div class="timeline-item-duration">${duration}</div>` : ''}
                            </div>
                            <button class="timeline-item-delete" data-index="${index}">✕</button>
                        </div>
                    `;
                }).join('');

                // Add delete listeners
                document.querySelectorAll('.timeline-item-delete').forEach(btn => {
                    btn.addEventListener('click', () => {
                        this.deleteTask(parseInt(btn.dataset.index));
                    });
                });

                this.updateStats(dayTasks);
            },

            updateStats(dayTasks) {
                if (dayTasks.length === 0) {
                    document.getElementById('statCount').textContent = '0';
                    document.getElementById('statStart').textContent = '--:--';
                    document.getElementById('statEnd').textContent = '--:--';
                    return;
                }

                document.getElementById('statCount').textContent = dayTasks.length;
                document.getElementById('statStart').textContent = dayTasks[0].time;
                document.getElementById('statEnd').textContent = dayTasks[dayTasks.length - 1].time;
            },

            exportText() {
                const dayTasks = this.tasks[this.currentDate] || [];
                if (dayTasks.length === 0) {
                    this.showToast('Nenhum registo para exportar', 'error');
                    return;
                }

                const dateObj = new Date(this.currentDate + 'T00:00:00');
                const dateStr = dateObj.toLocaleDateString('pt-PT', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });

                let text = `📋 RELATÓRIO DE TAREFAS\n`;
                text += `Data: ${dateStr}\n`;
                text += `${'='.repeat(50)}\n\n`;

                dayTasks.forEach((task, index) => {
                    const nextTask = dayTasks[index + 1];
                    let duration = '';

                    if (nextTask) {
                        const current = new Date(`2000-01-01 ${task.time}`);
                        const next = new Date(`2000-01-01 ${nextTask.time}`);
                        const diff = Math.round((next - current) / 60000);
                        if (diff > 0) {
                            duration = ` [${diff}min]`;
                        }
                    }

                    text += `${task.time} - ${task.task}${duration}\n`;
                });

                text += `\n${'='.repeat(50)}\n`;
                text += `Total de registos: ${dayTasks.length}\n`;
                text += `Exportado: ${new Date().toLocaleString('pt-PT')}\n`;

                navigator.clipboard.writeText(text).then(() => {
                    this.showToast('✓ Copiado para clipboard!', 'success');
                }).catch(() => {
                    this.showToast('Erro ao copiar', 'error');
                });
            },

            backupJson() {
                const backup = {
                    version: '1.0',
                    exportDate: new Date().toISOString(),
                    data: this.tasks
                };

                const dataStr = JSON.stringify(backup, null, 2);
                const dataBlob = new Blob([dataStr], { type: 'application/json' });
                const url = URL.createObjectURL(dataBlob);
                const link = document.createElement('a');
                link.href = url;
                link.download = `industrial-logger-backup-${new Date().toISOString().split('T')[0]}.json`;
                link.click();
                URL.revokeObjectURL(url);

                this.showToast('✓ Backup descarregado!', 'success');
            },

            importBackup(event) {
                const file = event.target.files[0];
                if (!file) return;

                const reader = new FileReader();
                reader.onload = (e) => {
                    try {
                        const backup = JSON.parse(e.target.result);
                        if (backup.data && typeof backup.data === 'object') {
                            this.tasks = backup.data;
                            this.saveData();
                            this.render();
                            this.showToast('✓ Backup importado!', 'success');
                        } else {
                            this.showToast('Formato inválido', 'error');
                        }
                    } catch (error) {
                        this.showToast('Erro ao importar', 'error');
                    }
                };
                reader.readAsText(file);
                event.target.value = '';
            },

            clearDay() {
                if (confirm(`Tem a certeza que quer limpar todos os registos de ${this.currentDate}?`)) {
                    delete this.tasks[this.currentDate];
                    this.saveData();
                    this.render();
                    this.showToast('Dia limpo', 'info');
                }
            },

            showToast(message, type = 'info') {
                const toast = document.createElement('div');
                toast.className = `toast ${type}`;
                toast.textContent = message;
                document.body.appendChild(toast);

                setTimeout(() => {
                    toast.remove();
                }, 2500);
            }
        };

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            app.init();
        });

        // Prevent accidental zoom
        document.addEventListener('touchmove', (e) => {
            if (e.scale !== 1) {
                e.preventDefault();
            }
        }, { passive: false });
    </script>
</body>
</html>
